<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | Stackly Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== GLOBAL ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0a0a0a;
  color:#fff;
}

/* ===== TOPBAR ===== */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  background:#000;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid rgba(255,46,46,0.2);
  z-index:3000;
}

.left{
  display:flex;
  align-items:center;
  gap:15px;
}

.hamburger{
  display:none;
  cursor:pointer;
  font-size:18px;
}

.user-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.user-info p{
  font-weight:700;
  color:#ff2e2e;
}

.user-info span{
  font-size:11px;
  color:#aaa;
}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;
  top:70px;
  left:0;
  width:260px;
  height:100%;
  background:#0d0d0d;
  border-right:1px solid rgba(255,46,46,0.2);
  padding:20px;
  display:flex;
  flex-direction:column;
}

.sidebar a{
  text-decoration:none;
  color:#aaa;
  padding:12px;
  border-radius:10px;
  display:flex;
  gap:10px;
}

.sidebar a:hover{
  background:rgba(255,46,46,0.1);
  color:#ff2e2e;
}

.sidebar a.active{
  background:#ff2e2e;
  color:#fff;
}

.logout{
  margin-top:auto;
  background:#ff2e2e;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

/* ===== MAIN ===== */
.main{
  margin-left:260px;
  padding:90px 20px;
}

/* ===== HEADER ACTIONS ===== */
.header-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  gap:10px;
}

.search{
  flex:1;
  display:flex;
}

.search input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:#fff;
}

.add-btn{
  background:#ff2e2e;
  border:none;
  padding:10px 15px;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

/* ===== PRODUCTS GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:15px;
  transition:0.3s;
  border:1px solid rgba(255,46,46,0.1);
}

.card:hover{
  transform:translateY(-5px);
  border-color:#ff2e2e;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

.price{
  color:#ff2e2e;
  font-weight:700;
  margin:5px 0;
}

.stock{
  font-size:12px;
  color:#aaa;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.edit{
  background:#1f7a5a;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.delete{
  background:#ff2e2e;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* ===== RESPONSIVE ===== */

@media(max-width:1200px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:768px){

  .hamburger{
    display:block;
  }

  .sidebar{
    transform:translateX(-100%);
    transition:0.3s;
  }

  .sidebar.active{
    transform:translateX(0);
  }

  .main{
    margin-left:0;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .header-bar{
    flex-direction:column;
    align-items:stretch;
  }
}

</style>
</head>

<body>

<!-- ===== TOPBAR ===== -->
<header class="topbar">

  <div class="left">
    <div class="hamburger" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars"></i>
    </div>
    <h2>STACKLY ADMIN</h2>
  </div>

  <div class="user-box">
    <div class="user-info">
      <p id="role">ADMIN</p>
      <span id="email">admin@stackly.com</span>
    </div>
  </div>

</header>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">

  <a href="admin.html"><i class="fa fa-house"></i> Dashboard</a>
  <a href="./products.html"><i class="fa fa-box"></i> Products</a>
  <a href="./user.html"><i class="fa fa-users"></i> Users</a>
  <a href="./orders.html"><i class="fa fa-cart-shopping"></i> Orders</a>
  <a href="./login.html"><i class="fa fa-cart-shopping"></i> Logout</a>

  <button class="logout" onclick="logout()">Logout</button>

</aside>

<!-- ===== MAIN ===== -->
<main class="main">

<!-- HEADER -->
<div class="header-bar">

  <div class="search">
    <input type="text" placeholder="Search products...">
  </div>

  <button class="add-btn"><i class="fa fa-plus"></i> Add Product</button>

</div>

<!-- PRODUCTS -->
<div class="grid">

  <div class="card">
    <img src="./black kurthi.webp">
    <h3>Bridal Dress</h3>
    <p class="price">₹1999</p>
    <p class="stock">Stock: 12</p>

    <div class="actions">
      <button class="edit">Edit</button>
      <button class="delete">Delete</button>
    </div>
  </div>

  <div class="card">
    <img src="./dress.webp">
    <h3>Fashion Wear</h3>
    <p class="price">₹1499</p>
    <p class="stock">Stock: 20</p>

    <div class="actions">
      <button class="edit">Edit</button>
      <button class="delete">Delete</button>
    </div>
  </div>

  <div class="card">
    <img src="./shirt11.webp">
    <h3>Casual Wear</h3>
    <p class="price">₹999</p>
    <p class="stock">Stock: 8</p>

    <div class="actions">
      <button class="edit">Edit</button>
      <button class="delete">Delete</button>
    </div>
  </div>

</div>

</main>

<script>



function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("active");
}

/* ===== REDIRECT ALL ACTIONS TO 404 ===== */

function go404(){
  window.location.href = "ad_404.html"; // your 404 page
}

/* Attach actions after page loads */
document.addEventListener("DOMContentLoaded", () => {

  // Add Product button
  document.querySelector(".add-btn").addEventListener("click", function(e){
    e.preventDefault();
    go404();
  });

  // Edit buttons
  document.querySelectorAll(".edit").forEach(btn => {
    btn.addEventListener("click", function(e){
      e.preventDefault();
      go404();
    });
  });

  // Delete buttons
  document.querySelectorAll(".delete").forEach(btn => {
    btn.addEventListener("click", function(e){
      e.preventDefault();
      go404();
    });
  });

});

function logout(){
  window.location.href="login.html";
}


</script>

</body>
</html>
