<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders | Stackly Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0a0a0a;color:#fff;}

/* TOPBAR */
.topbar{
position:fixed;top:0;width:100%;height:70px;
background:#000;
display:flex;justify-content:space-between;align-items:center;
padding:0 20px;
border-bottom:1px solid rgba(255,0,0,0.2);
}

.hamburger{display:none;cursor:pointer;}

.sidebar{
position:fixed;top:70px;left:0;width:250px;height:100%;
background:#0d0d0d;padding:20px;
border-right:1px solid rgba(255,0,0,0.2);
display:flex;flex-direction:column;
}

.sidebar a{
padding:12px;
color:#aaa;
text-decoration:none;
display:flex;
gap:10px;
border-radius:8px;
}

.sidebar a:hover{background:#111;color:#ff2e2e;}
.sidebar a.active{background:#ff2e2e;color:#fff;}

.logout{
margin-top:auto;
background:#ff2e2e;
color:#fff;
padding:12px;
border:none;
border-radius:8px;
}

/* MAIN */
.main{
margin-left:250px;
padding:90px 20px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,0,0,0.1);
}

/* TABLE */
.table{
width:100%;
border-collapse:collapse;
min-width:600px;
}

.table th,.table td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.status{
padding:5px 10px;
border-radius:6px;
font-size:12px;
}

.pending{background:#f59e0b;}
.shipped{background:#3b82f6;}
.delivered{background:#1f7a5a;}

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.view{background:#1f7a5a;color:#fff;}
.update{background:#ff2e2e;color:#fff;}

/* RESPONSIVE */
@media(max-width:768px){

.hamburger{display:block;}

.sidebar{transform:translateX(-100%);transition:0.3s;}
.sidebar.active{transform:translateX(0);}

.main{margin-left:0;}

.table-wrapper{overflow-x:auto;}
}

</style>
</head>

<body>

<div class="topbar">
  <div class="hamburger" onclick="toggleSidebar()">
    <i class="fa fa-bars"></i>
  </div>
  <h3>Orders</h3>

  <div>
    ADMIN | admin@stackly.com
  </div>
</div>

<aside class="sidebar" id="sidebar">
    <a href="admin.html"><i class="fa fa-house"></i> Dashboard</a>
    <a href="./products.html"><i class="fa fa-box"></i> Products</a>
    <a href="./user.html"><i class="fa fa-users"></i> Users</a>
    <a href="./orders.html"><i class="fa fa-cart-shopping"></i> Orders</a>
    <a href="./login.html"><i class="fa fa-cart-shopping"></i> Logout</a>
</aside>

<div class="main">

<div class="cards">
  <div class="card"><h3>120</h3><p>Total Orders</p></div>
  <div class="card"><h3>80</h3><p>Delivered</p></div>
  <div class="card"><h3>25</h3><p>Pending</p></div>
</div>

<div class="table-wrapper">
<table class="table">

<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>#101</td>
<td>Priya</td>
<td><span class="status delivered">Delivered</span></td>
<td>
<button class="btn view" onclick="go404()">View</button>
<button class="btn update" onclick="go404()">Update</button>
</td>
</tr>

<tr>
<td>#102</td>
<td>Arjun</td>
<td><span class="status pending">Pending</span></td>
<td>
<button class="btn view" onclick="go404()">View</button>
<button class="btn update" onclick="go404()">Update</button>
</td>
</tr>

</table>
</div>

</div>

<script>

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

function go404(){
window.location.href="ad_404.html";
}

</script>

</body>
</html>
